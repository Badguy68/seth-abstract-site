<!DOCTYPE html>

<head>

    <!-- ========================= FONTS ========================= -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

    <!-- ========================= NAVIGATION ========================= -->

    <main class="secret-page">

            <section class="secret-panel">
                <p class="secret-kicker">found fragments</p>

                <div class="secret-typewriter">

                <form id="secret-form" class="secret-form">

                    <input class="secret-input" type="text" autocomplete="off" spellcheck="false">

                        Check
                    </button>

                <p id="secret-message" class="secret-message"></p>
            </section>
        </div>
    </main>

    <!-- ========================= FOOTER ========================= -->
