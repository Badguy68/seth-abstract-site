<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Seth Abstract</title>

  <!-- ========================= FONTS ========================= -->
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">

  <!-- Adobe Fonts -->
  <link rel="stylesheet" href="https://use.typekit.net/ugg8kvv.css">

  <!-- ========================= STYLES ========================= -->
  <!-- Global Design System -->
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/layout.css">

  <!-- Page-Specific Styles -->
  <link rel="stylesheet" href="/css/secrets_shared.css">

</head>

<body>

  <!-- ========================= NAVIGATION ========================= -->
  <div id="site-header"></div>

  <!-- ========================= MAIN CONTENT ========================= -->
  <main class="community-page-main">
    <section class="section community-secret-section">

      <!-- BEFORE SUBMISSION -->
      <div id="secret-form-view" class="community-secret-panel">
        <p class="text-header">Secret Exchange</p>

        <h1 class="community-title">Leave something true behind.</h1>

        <p class="community-description">
          Write an anonymous secret. When you send yours, you will receive one left by someone else as well as a secret keyword.
        </p>

        <form id="community-secret-form" class="community-form">
          <textarea
            id="community-secret-input"
            class="community-textarea"
            placeholder="Write 2–5 sentences. Something honest. Something hidden."
            maxlength="900"
          ></textarea>

          <button class="button button-red community-submit" type="submit">
            Send Secret
          </button>
        </form>

        <p id="community-form-message" class="community-message"></p>
      </div>

      <!-- AFTER SUBMISSION -->
      <div id="secret-result-view" class="community-secret-panel is-hidden">
        <p class="community-small-text">a secret keyword is</p>

        <h2 class="community-keyword">community</h2>

        <p class="community-received-label">someone left this behind</p>

        <div class="community-received-secret">
          <p id="community-received-secret-text"></p>
        </div>
      </div>

    </section>
  </main>

  <!-- ========================= FOOTER ========================= -->
  <div id="site-footer"></div>

  <!-- ========================= SCRIPTS ========================= -->
    <script src="/js/includes.js"></script>
  <script src="/js/global.js"></script>
  <script src="/js/secrets_shared.js"></script>

</body>
</html>
