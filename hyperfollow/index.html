<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Seth Abstract</title>

  <!-- ========================= FONTS ========================= -->
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">

  <!-- Adobe Fonts -->
  <link rel="stylesheet" href="https://use.typekit.net/ugg8kvv.css">

  <!-- ========================= STYLES ========================= -->
  <!-- Global Design System -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">

  <!-- Page-Specific Styles -->
  <link rel="stylesheet" href="../css/hyperfollow.css">

</head>

<body>

  <!-- ========================= NAVIGATION ========================= -->
  <header class="site-header">
    <nav class="nav">
      <a href="./" class="nav-item active">Home</a>
      <a href="/" class="nav-item">Music</a>
      <a href="/store/" class="nav-item">Store</a>
      <a href="/media/" class="nav-item">Media</a>
    </nav>
  </header>

  <!-- ========================= MAIN CONTENT ========================= -->
  <main class="music-page-main">

    <section class="section music-portal">
      <div class="music-portal-inner">

        <!-- Album Art -->
        <figure class="music-cover">
          <img src="../home_assets/living_archive_cover.png" alt="Album cover for project">
        </figure>

        <!-- Title Area -->
        <div class="music-meta">
          <h1 class="music-title">The Living Archive</h1>
          <p class="music-artist">Seth Abstract</p>
          <p class="text-desc">An album turning classic poems into songs. Available on all music platforms.</p>
        </div>

        

        <!-- Platform Links -->
        <div class="platform-links">
          <a href="#" class="platform-link">Apple Music</a>
          <a href="#" class="platform-link">YouTube Music</a>
          <a href="#" class="platform-link">Amazon Music</a>
          <a href="#" class="platform-link">Tidal</a>
          <a href="#" class="platform-link">Deezer</a>
        </div>

        <!-- Primary CTA -->
        <div class="music-primary-action">
          <a href="#" class="button button-red music-primary-button">Listen on Spotify</a>
        </div>

      </div>
    </section>

  </main>

  <!-- ========================= FOOTER ========================= -->
  <footer class="site-footer">
    <!-- Footer content -->
  </footer>

  <!-- ========================= SCRIPTS ========================= -->
  <script src="../js/global.js"></script>
